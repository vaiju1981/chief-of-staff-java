name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    # A pgvector Postgres service will be added here when the RAG (library / meeting search) tests land.
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21 (the java-ai-agent baseline)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (cache + wrapper validation)
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true

      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace
